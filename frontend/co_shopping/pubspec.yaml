name: co_shopping
description: 'App de lista de compras P2P con IA local'
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- GESTIÓN DE ESTADO ---
  flutter_riverpod: ^2.5.1

  # --- PERSISTENCIA LOCAL (ISAR) ---
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.2

  # --- IA LOCAL (WEBVIEW) ---
  flutter_inappwebview: ^6.0.0

  # --- QR CODES ---
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.5

  # --- PERMISOS ---
  permission_handler: ^11.3.0

  # --- UI & UTILIDADES ---
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.6
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

  # --- PERSISTENCIA LOCAL (ISAR) ---
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.2

  # --- P2P & NETWORKING ---
  # Actualizamos a la 0.12.1 que elimina el uso de 'Registrar'
  flutter_webrtc: ^0.12.1
  web_socket_channel: ^3.0.1
  uuid: ^4.3.3
flutter:
  uses-material-design: true

  # Assets necesarios para la IA local (Prompt 6)
  assets:
    - assets/ai/
    - assets/ai/ai_model.html
